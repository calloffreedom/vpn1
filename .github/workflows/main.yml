name: PURE WIREGUARD (NATIVE ROAMING)

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 🚀 Install WireGuard & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard netcat-openbsd curl

      - name: ⚙️ Configure IP Forwarding & NAT Routing
        run: |
          echo "net.ipv4.ip_forward = 1" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          
          # Get active network interface
          INTERFACE=$(ip route show default | awk '{print $5}')
          
          # Route all client internet traffic out through the runner's interface
          sudo iptables -t nat -A POSTROUTING -o $INTERFACE -j MASQUERADE
          sudo iptables -A FORWARD -i wg0 -j ACCEPT
          sudo iptables -A FORWARD -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT

      - name: 🔑 Generate Standard Cryptographic Keys
        run: |
          umask 077
          wg genkey | tee server.key | wg pubkey > server.pub
          wg genkey | tee client.key | wg pubkey > client.pub
          
          echo "SERVER_PRIV=$(cat server.key)" >> $GITHUB_ENV
          echo "SERVER_PUB=$(cat server.pub)" >> $GITHUB_ENV
          echo "CLIENT_PRIV=$(cat client.key)" >> $GITHUB_ENV
          echo "CLIENT_PUB=$(cat client.pub)" >> $GITHUB_ENV

      - name: 🌐 Discover Public NAT Mapping
        run: |
          # Fetch the runner's external public IP address
          PUBLIC_IP=$(curl -s https://ifconfig.me)
          echo "RUNNER_PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: 📝 Initialize WireGuard Server
        run: |
          cat <<EOF | sudo tee /etc/wireguard/wg0.conf
          [Interface]
          PrivateKey = ${{ env.SERVER_PRIV }}
          Address = 10.8.0.1/24
          ListenPort = 51820

          [Peer]
          PublicKey = ${{ env.CLIENT_PUB }}
          AllowedIPs = 10.8.0.2/32
          EOF

          sudo wg-quick up wg0

      - name: 🖥️ GENERATE CLIENT CONFIG
        run: |
          echo "==================================================="
          echo "      IMPORT THIS INTO YOUR NATIVE WIREGUARD APP   "
          echo "==================================================="
          cat <<EOF
          [Interface]
          PrivateKey = ${{ env.CLIENT_PRIV }}
          Address = 10.8.0.2/24
          DNS = 1.1.1.1, 8.8.8.8

          [Peer]
          PublicKey = ${{ env.SERVER_PUB }}
          Endpoint = ${{ env.RUNNER_PUBLIC_IP }}:51820
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 15
          EOF
          echo "==================================================="

      - name: 🔨 Keep NAT Port Open (UDP Punch loop)
        run: |
          echo "Running low-level UDP keep-alive to hold the firewall port open..."
          # Continuously fires light UDP bursts to keep the Azure NAT mapping alive 
          # so your native client can hit port 51820 directly at any time.
          while true; do
            echo "KeepAlive" | nc -u -w 1 8.8.8.8 53 || true
            sleep 10
          done
