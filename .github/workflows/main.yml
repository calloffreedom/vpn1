name: WIREGUARD VPN (DIRECT CONNECTION)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf iptables
          echo "✅ WireGuard Installed"

      - name: Configure WireGuard Server
        run: |
          # Generate Server and Client Keys
          wg genkey | tee server_private.key | wg pubkey > server_public.key
          wg genkey | tee client_private.key | wg pubkey > client_public.key

          SERVER_PRIV=$(cat server_private.key)
          SERVER_PUB=$(cat server_public.key)
          CLIENT_PRIV=$(cat client_private.key)
          CLIENT_PUB=$(cat client_public.key)

          # Configure Server Interface (wg0)
          sudo bash -c "cat > /etc/wireguard/wg0.conf <<EOF
          [Interface]
          PrivateKey = $SERVER_PRIV
          Address = 10.0.0.1/24
          ListenPort = 51820
          
          PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

          [Peer]
          PublicKey = $CLIENT_PUB
          AllowedIPs = 10.0.0.2/32
          EOF"

          # Enable IP Forwarding
          sudo sysctl -w net.ipv4.ip_forward=1

          # Start WireGuard
          sudo wg-quick up wg0
          echo "✅ WireGuard Server Started"

          # Save client keys
          echo "$CLIENT_PRIV" > client_private.txt
          echo "$SERVER_PUB" > server_public.txt

      - name: Start Public UDP Tunnel (Pinggy)
        run: |
          # Create a public UDP tunnel via SSH (using port 443 to bypass firewall restrictions)
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -p 443 -R 0:localhost:51820 udp@a.pinggy.io > pinggy.log 2>&1 &
          
          echo "Waiting for public UDP endpoint..."
          for i in {1..15}; do
            sleep 2
            # Extract the public URL (e.g. rnxxx-xxx.a.pinggy.link:xxxxx)
            ENDPOINT=$(grep -oE '[a-zA-Z0-9.-]+\.pinggy\.link:[0-9]+' pinggy.log | head -n 1)
            if [ -n "$ENDPOINT" ]; then 
              echo "🌐 Public Endpoint Found: $ENDPOINT"
              break
            fi
          done
          echo "$ENDPOINT" > endpoint.txt

      - name: SHOW CONNECT INFO & GENERATE CONFIG
        run: |
          CLIENT_PRIV=$(cat client_private.txt)
          SERVER_PUB=$(cat server_public.txt)
          ENDPOINT=$(cat endpoint.txt)

          if [ -z "$ENDPOINT" ]; then
            echo "❌ Error: Could not obtain public endpoint. Checking tunnel logs:"
            cat pinggy.log
            exit 1
          fi

          echo "==================================================="
          echo "       WIREGUARD VPN READY (NO CLIENT TUNNEL)"
          echo "==================================================="
          echo "Public Endpoint : $ENDPOINT"
          echo "==================================================="
          echo ""
          echo "👉 Save this exact configuration as 'github-vpn.conf':"
          echo ""
          echo "[Interface]"
          echo "PrivateKey = $CLIENT_PRIV"
          echo "Address = 10.0.0.2/24"
          echo "DNS = 1.1.1.1"
          echo ""
          echo "[Peer]"
          echo "PublicKey = $SERVER_PUB"
          echo "Endpoint = $ENDPOINT"
          echo "AllowedIPs = 0.0.0.0/0"
          echo "PersistentKeepalive = 25"
          echo ""
          echo "==================================================="
          echo "💡 HOW TO CONNECT:"
          echo "1. Copy the configuration block above."
          echo "2. Import it directly into the official WireGuard App on"
          echo "   your phone, laptop, or router."
          echo "3. Connect! All traffic now routes through the runner."
          echo "==================================================="

      - name: Keep Alive
        run: sleep 21600
