name: PURE WIREGUARD (FINAL WORKING VERSION)

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Install WireGuard & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard iproute2 iptables curl

      - name: Enable IP Forwarding
        run: |
          echo "net.ipv4.ip_forward = 1" | sudo tee /etc/sysctl.conf
          sudo sysctl -p

      - name: Generate Keys
        run: |
          umask 077
          wg genkey | tee server.key | wg pubkey > server.pub
          wg genkey | tee client.key | wg pubkey > client.pub

          echo "SERVER_PRIV=$(cat server.key)" >> $GITHUB_ENV
          echo "SERVER_PUB=$(cat server.pub)" >> $GITHUB_ENV
          echo "CLIENT_PRIV=$(cat client.key)" >> $GITHUB_ENV
          echo "CLIENT_PUB=$(cat client.pub)" >> $GITHUB_ENV

      - name: Detect Public IP
        run: |
          PUBLIC_IP=$(curl -s https://ifconfig.me)
          echo "RUNNER_PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Configure WireGuard Server
        env:
          SERVER_PRIV: ${{ env.SERVER_PRIV }}
          CLIENT_PUB: ${{ env.CLIENT_PUB }}
        run: |
          INTERFACE=$(ip route show default | awk '{print $5}')

          sudo mkdir -p /etc/wireguard
          sudo chmod 700 /etc/wireguard

          CONFIG="[Interface]\nPrivateKey = ${SERVER_PRIV}\nAddress = 10.8.0.1/24\nListenPort = 51820\nPostUp = iptables -t nat -A POSTROUTING -o ${INTERFACE} -j MASQUERADE; iptables -A FORWARD -i %i -j ACCEPT\nPostDown = iptables -t nat -D POSTROUTING -o ${INTERFACE} -j MASQUERADE; iptables -D FORWARD -i %i -j ACCEPT\n\n[Peer]\nPublicKey = ${CLIENT_PUB}\nAllowedIPs = 10.8.0.2/32"

          echo -e "$CONFIG" | sudo tee /etc/wireguard/wg0.conf >/dev/null

          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Generate Client Config
        env:
          CLIENT_PRIV: ${{ env.CLIENT_PRIV }}
          SERVER_PUB: ${{ env.SERVER_PUB }}
          RUNNER_PUBLIC_IP: ${{ env.RUNNER_PUBLIC_IP }}
        run: |
          CLIENTCFG="[Interface]\nPrivateKey = ${CLIENT_PRIV}\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = ${SERVER_PUB}\nEndpoint = ${RUNNER_PUBLIC_IP}:51820\nAllowedIPs = 0.0.0.0/0\nPersistentKeepalive = 25"

          echo -e "$CLIENTCFG" | tee client.conf

          echo "================ CLIENT CONFIG ================"
          cat client.conf
          echo "==============================================="

      - name: NAT Keepalive (FINAL WORKING)
        env:
          CLIENT_PUB: ${{ env.CLIENT_PUB }}
        run: |
          # Enable WireGuard's built-in keepalive
          sudo wg set wg0 peer ${CLIENT_PUB} persistent-keepalive 25

          # Keep the job alive without crashing
          while true; do
            sleep 60
          done
